<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFit | Selector de Ruta</title>
    <style>
        :root {
            --bg-color: rgb(202, 202, 202);
            --card-bg: #ffffff;
            --nav-bg: #0f172a;
            --text-main: #1e293b;
            --border-color: #000000;
            --orange: #ff9900;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        /* --- NAVEGACIÓN --- */
      nav {
    display: flex;
    justify-content: space-between; /* Logo a la izquierda, links a la derecha */
    align-items: center;
    padding: 0.8rem 2rem; /* Reducimos el padding vertical */
    background: var(--nav-bg);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
}

/* Contenedor de enlaces */
.nav-links {
    display: flex;
    gap: 25px;
}

nav a {
    color: #ff9900;
    text-decoration: none;
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.85rem; /* Un poco más pequeño para legibilidad */
    letter-spacing: 1px;
}

/* --- LOGO COMPACTO E INTERACTIVO --- */
.devfit-logo-wrapper {
    display: flex;
    align-items: center;
    gap: 8px; /* Menos espacio entre icono y texto */
    text-decoration: none !important; /* Quita subrayados de enlace */
    padding: 0;
}

.devfit-symbol {
    width: 32px; /* Reducido de 45px */
    height: 32px; /* Reducido de 45px */
    border: 2px solid #000000;
    background-color: #ffffff;
    border-radius: 40% 10% 40% 40%; 
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 2px 2px 0px #ff7a00; /* Sombra más pequeña */
    transition: all 0.2s ease;
}

.code-icon {
    color: #00d2ff;
    font-family: 'Courier New', monospace;
    font-weight: 900;
    font-size: 0.75rem; /* Icono más pequeño */
}

.devfit-brand {
    font-size: 1.3rem; /* Reducido de 1.8rem */
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.5px;
    display: flex;
    align-items: baseline;
    text-transform: none; /* Evita que el logo se ponga en mayúsculas por el estilo general de nav a */
}

.text-dev { color: #ff7a00; }
.text-sh {
    color: #00d2ff;
    font-size: 0.7rem;
    font-family: 'Courier New', monospace;
    margin-left: 1px;
}

/* Hover interactivo para todo el logo */
.devfit-logo-wrapper:hover .devfit-symbol {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0px #ff7a00;
}

        /* --- CONTENEDOR --- */
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 60px 20px; 
        }
        
        header { text-align: center; margin-bottom: 60px; }
        
        header h1 {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #000000, #444444);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        /* --- BOX DE SELECCIÓN --- */
        .selector-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 12px 12px 0px var(--border-color);
            margin-bottom: 50px;
            text-align: center;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
        }

        /* --- BOTONES CON VOLUMEN --- */
        .action-btn {
            background: white;
            border: 2px solid var(--border-color);
            padding: 25px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 6px 6px 0px var(--border-color);
            text-transform: uppercase;
        }

        .action-btn:hover {
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0px var(--border-color);
            background: #f8fafc;
        }

        .action-btn.active {
            background: var(--orange);
            color: white;
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px;
        }

        /* --- SECCIÓN DE NIVEL (OCULTA POR DEFECTO) --- */
        #level-selection {
            display: none;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer { 
            text-align: center; 
            padding: 80px; 
            background: var(--nav-bg); 
            color: #ff9900; 
            margin-top: 100px; 
        }
    </style>
</head>
<body>

     <nav>
    <a href="index.html" class="devfit-logo-wrapper">
        <div class="devfit-symbol">
            <span class="code-icon">&lt;/&gt;</span>
        </div>
        <div class="devfit-brand">
            <span class="text-dev">dev</span>Fit<span class="text-sh">.sh</span>
        </div>
    </a>

    <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="rutinasVarias.html">Rutinas</a>
        <a href="problemasVarios.html">Problemas</a>
        <a href="ergonomia.html">Ergonomía</a>
    </div>
</nav>

    <div class="container">
        <header>
            <h1>Routine_Router</h1>
            <p>// Select parameters to boot the workout</p>
        </header>

        <div class="selector-card">
            <h2>01. Selecciona Objetivo</h2>
            <div class="btn-grid">
                <button class="action-btn" onclick="setGoal('fuerza', this)">Fuerza</button>
                <button class="action-btn" onclick="setGoal('resistencia', this)">Resistencia</button>
                <button class="action-btn" onclick="setGoal('movilidad', this)">Movilidad</button>
            </div>
        </div>

        <div id="level-selection" class="selector-card">
            <h2>02. Selecciona Nivel</h2>
            <div class="btn-grid">
                <button class="action-btn" onclick="redirect('bajo')">Bajo</button>
                <button class="action-btn" onclick="redirect('medio')">Medio</button>
                <button class="action-btn" onclick="redirect('alto')">Alto</button>
            </div>
        </div>
    </div>

    <footer>
        <span style="color:white; font-weight:900; font-size:1.5rem;">DevFit.sh</span>
        <p>&copy; 2026 - High Performance Human Hardware</p>
    </footer>

<script>
    // Usamos una variable global muy clara
    var objetivoGlobal = "";

    function setGoal(goal, btn) {
        // 1. Guardamos el objetivo
        objetivoGlobal = goal;
        
        // 2. Estética: Quitar 'active' de los hermanos y ponerlo en este
        var botones = btn.parentElement.getElementsByClassName('action-btn');
        for (var i = 0; i < botones.length; i++) {
            botones[i].classList.remove('active');
        }
        btn.classList.add('active');

        // 3. Mostrar la siguiente sección
        document.getElementById('level-selection').style.display = 'block';
        
        // 4. Bajar la pantalla automáticamente
        window.scrollTo({
            top: document.getElementById('level-selection').offsetTop,
            behavior: 'smooth'
        });
    }

    function redirect(nivel) {
        // Si el usuario no eligió objetivo, avisamos
        if (objetivoGlobal === "") {
            alert("Por favor, selecciona primero un objetivo (Fuerza, Resistencia o Movilidad)");
            return;
        }

        // CONSTRUCCIÓN DE LA RUTA
        // Si eliges Fuerza y Bajo, esto crea: "fuerza_bajo.html"
        var urlFinal = objetivoGlobal + "_" + nivel + ".html";

        // REDIRECCIÓN DIRECTA
        window.location = urlFinal;
    }
</script>

</body>
</html>

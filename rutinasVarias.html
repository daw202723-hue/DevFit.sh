<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFit | Routine Router</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff7a00;
            --primary-dark: #e66e00;
            --secondary: #00d2ff;
            --bg-dark: #0f172a;
            --bg-light: #f8fafc;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --neon-glow: 0 0 15px rgba(255, 122, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: #1e293b;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVEGACIÓN UNIFICADA --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 70px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .devfit-logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .devfit-brand {
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            letter-spacing: -1px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* --- HEADER SECCIÓN --- */
        .router-header {
            background: var(--bg-dark);
            padding: 100px 20px 150px;
            text-align: center;
            color: white;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        .router-header h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 900;
            margin: 0;
            letter-spacing: -3px;
            text-transform: uppercase;
        }

        .router-header p {
            font-family: 'JetBrains Mono', monospace;
            color: var(--secondary);
            margin-top: 15px;
            letter-spacing: 2px;
            font-size: 1rem;
        }

        /* --- CONTENEDOR SELECTORES --- */
        .container {
            max-width: 1000px;
            margin: -80px auto 0;
            padding: 0 20px 100px;
            position: relative;
        }

        .selector-card {
            background: white;
            padding: 60px 40px;
            border-radius: 4px;
            box-shadow: var(--card-shadow);
            margin-bottom: 40px;
            border-left: 8px solid var(--primary);
            position: relative;
            overflow: hidden;
        }

        .selector-card::after {
            content: "PATH_FINDER";
            position: absolute;
            top: 10px;
            right: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: rgba(0,0,0,0.1);
            letter-spacing: 2px;
        }

        .selector-card h2 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--primary);
            font-weight: 900;
            margin-bottom: 30px;
        }

        /* --- GRID DE BOTONES --- */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .action-btn {
            background: var(--bg-light);
            border: 1px solid #e2e8f0;
            padding: 30px 20px;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
            position: relative;
        }

        .action-btn:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .action-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: var(--neon-glow);
        }

        .btn-desc {
            font-size: 0.7rem;
            font-weight: 400;
            opacity: 0.7;
            text-transform: none;
            font-family: 'JetBrains Mono', monospace;
        }

        /* --- NIVEL SELECTION --- */
        #level-selection {
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            border-left-color: var(--secondary);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- FOOTER UNIFICADO --- */
        footer {
            background: #000;
            color: white;
            padding: 60px 40px;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .footer-brand {
            font-weight: 900;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        /* Efecto de pulso para el botón activo */
        .active::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary);
            animation: pulse 1.5s infinite;
            top: 0;
            left: 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0; }
        }

    </style>
</head>
<body>

      <nav>
    <a href="index.html" class="devfit-logo-wrapper">
        <div class="devfit-symbol">
            <span class="code-icon">&lt;/&gt;</span>
        </div>
        <div class="devfit-brand">
            <span class="text-dev">dev</span>Fit<span class="text-sh">.sh</span>
        </div>
    </a>

    <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="rutinasVarias.html">Rutinas</a>
        <a href="problemasVarios.html">Problemas</a>
        <a href="ergonomia.html">Ergonomía</a>
    </div>
</nav>

    <header class="router-header">
        <h1>ROUTINE_<span>ROUTER</span></h1>
        <p>// SET_PARAMETERS && EXECUTE_WORKOUT</p>
    </header>

    <div class="container">
        <div class="selector-card">
            <h2>01. SELECT_GOAL</h2>
            <div class="btn-grid">
                <button class="action-btn" onclick="setGoal('fuerza', this)">
                    FUERZA
                    <span class="btn-desc">Power & Stability</span>
                </button>
                <button class="action-btn" onclick="setGoal('resistencia', this)">
                    RESISTENCIA
                    <span class="btn-desc">High Endurance</span>
                </button>
                <button class="action-btn" onclick="setGoal('movilidad', this)">
                    MOVILIDAD
                    <span class="btn-desc">Flex & Recovery</span>
                </button>
            </div>
        </div>

        <div id="level-selection" class="selector-card">
            <h2 style="color: var(--secondary);">02. SELECT_LEVEL</h2>
            <div class="btn-grid">
                <button class="action-btn" onclick="redirect('bajo')" style="border-bottom: 4px solid #22c55e;">
                    BAJO
                    <span class="btn-desc">Entry Level (1.0)</span>
                </button>
                <button class="action-btn" onclick="redirect('medio')" style="border-bottom: 4px solid #eab308;">
                    MEDIO
                    <span class="btn-desc">Advanced (2.5)</span>
                </button>
                <button class="action-btn" onclick="redirect('alto')" style="border-bottom: 4px solid #ef4444;">
                    ALTO
                    <span class="btn-desc">Overclocked (4.0)</span>
                </button>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-brand">DEV<span style="color:var(--primary)">FIT</span></div>
        <p>&copy; 2026 - ENGINEERED FOR HIGH PERFORMANCE HUMANS</p>
        <p style="color: #444; margin-top: 20px;">V.3.1.0 // ROUTER_MODULE</p>
    </footer>

<script>
    var objetivoGlobal = "";

    function setGoal(goal, btn) {
        objetivoGlobal = goal;
        
        // Estética: Reset de botones
        var botones = document.querySelectorAll('.action-btn');
        botones.forEach(b => b.classList.remove('active'));
        
        // Activar el seleccionado
        btn.classList.add('active');

        // Mostrar siguiente paso con delay suave
        const levelSection = document.getElementById('level-selection');
        levelSection.style.display = 'block';
        
        // Scroll suave hacia abajo
        setTimeout(() => {
            levelSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
    }

    function redirect(nivel) {
        if (objetivoGlobal === "") {
            alert("ERROR: SELECT_GOAL_BEFORE_BOOTING");
            return;
        }

        // Construcción de la ruta: "fuerza_bajo.html"
        var urlFinal = objetivoGlobal + "_" + nivel + ".html";
        
        // Efecto de parpadeo antes de redirigir (opcional)
        document.body.style.opacity = "0.5";
        
        window.location = urlFinal;
    }
</script>

</body>
</html>

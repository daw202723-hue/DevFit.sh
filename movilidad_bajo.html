<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFit | Movilidad Nivel Bajo (Essential Reset)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff; /* Verde para Movilidad Bajo/Recuperación */
            --bg-dark: #0f172a;
            --bg-light: #f8fafc;
            --orange: #ff7a00;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: #1e293b;
            line-height: 1.6;
        }

        /* --- NAVEGACIÓN --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 70px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .devfit-logo-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none !important;
        }

        .devfit-symbol {
            width: 32px;
            height: 32px;
            border: 2px solid #000000;
            background-color: #ffffff;
            border-radius: 40% 10% 40% 40%; 
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 2px 2px 0px var(--orange);
        }

        .code-icon {
            color: var(--primary);
            font-family: 'Courier New', monospace;
            font-weight: 900;
            font-size: 0.75rem;
        }

        .devfit-brand {
            font-size: 1.3rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* --- ADSENSE --- */
        .ads-box {
            background: #ebf2f7;
            border: 1px dashed #cbd5e1;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #94a3b8;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .ads-top { width: 100%; max-width: 728px; height: 90px; }

        /* --- HEADER --- */
        header {
            background: var(--bg-dark);
            padding: 80px 20px 120px;
            text-align: center;
            color: white;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
        }

        header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            margin: 0;
        }

        header span { color: var(--primary); }

        /* --- CONTAINER --- */
        .container {
            max-width: 900px;
            margin: -60px auto 0;
            padding: 0 20px 100px;
        }

        .selector-card {
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: var(--card-shadow);
            text-align: center;
            margin-bottom: 40px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .day-btn {
            background: var(--bg-light);
            border: 2px solid #e2e8f0;
            padding: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'JetBrains Mono', monospace;
            border-radius: 4px;
        }

        .day-btn:hover { border-color: var(--primary); color: var(--primary); }
        .day-btn.active { background: var(--primary); color: var(--bg-dark); border-color: var(--primary); }

        /* --- ROUTINE CARDS --- */
        .split-card {
            background: white;
            border-radius: 4px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border-left: 6px solid var(--primary);
            animation: fadeIn 0.5s ease;
        }

        .split-title {
            display: inline-block;
            background: var(--bg-dark);
            color: var(--primary);
            padding: 5px 15px;
            font-weight: 900;
            margin-bottom: 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-family: 'JetBrains Mono', monospace;
        }

        .exercise-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .exercise-item:last-child { border: none; }
        .exercise-item strong { display: block; font-size: 1.1rem; color: var(--bg-dark); }
        .exercise-item span {
            color: #64748b;
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            display: block;
            margin-top: 4px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { background: #000; color: white; padding: 60px; text-align: center; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="devfit-logo-wrapper">
        <div class="devfit-symbol"><span class="code-icon">&lt;/&gt;</span></div>
        <div class="devfit-brand"><span style="color:#cbd5e1">dev</span>Fit<span style="color:#cbd5e1; font-size: 0.7rem; font-family: monospace;">.sh</span></div>
    </a>
    <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="rutinasVarias.html">Volver</a>
    </div>
</nav>

<header>
    <h1>MOVILIDAD_<span>BAJO</span>.EXE</h1>
    <p>// ESSENTIAL_RESET: DESKTOP DECOMPRESSION</p>
</header>

<div class="container">
    <div class="ads-box ads-top">Publicidad AdSense</div>

    <div class="selector-card">
        <h3 style="font-weight: 900; margin-top: 0;">PREVENTIVE_SELECTOR</h3>
        <p style="color: #64748b; font-size: 0.9rem;">Pequeñas dosis de movimiento para grandes jornadas de código:</p>
        <div class="days-grid">
            <button class="day-btn" onclick="showRoutine(2, this)">2_SESSIONS</button>
            <button class="day-btn" onclick="showRoutine(3, this)">3_SESSIONS</button>
            <button class="day-btn" onclick="showRoutine(4, this)">4_SESSIONS</button>
        </div>
    </div>

    <div id="routine-display">
        </div>

    <div class="ads-box ads-top">Publicidad AdSense</div>
</div>

<footer>
    <div style="font-weight: 900; font-size: 1.5rem;">DEV<span style="color:var(--primary)">FIT</span>.SH</div>
    <p>&copy; 2026 - HEALTHY CODE INITIATIVE</p>
</footer>

<script>
    const routines = {
        2: `
            <div class="split-card">
                <span class="split-title">DÍA 01: LIBERACIÓN DE CUELLO & ESPALDA</span>
                <div class="exercise-item">
                    <strong>Círculos de Cuello Suaves</strong>
                    <span>2 series x 10 círculos // Muy lento para aliviar la tensión cervical.</span>
                </div>
                <div class="exercise-item">
                    <strong>Estiramiento Lateral de Columna</strong>
                    <span>3 series x 30 seg por lado // De pie, inclínate hacia un lado para abrir costillas.</span>
                </div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 02: MOVILIDAD DE SILLA</span>
                <div class="exercise-item">
                    <strong>Rotación Torácica Sentado</strong>
                    <span>3 series x 10 por lado // Gira el tronco usando el respaldo de la silla.</span>
                </div>
                <div class="exercise-item">
                    <strong>Estiramiento de Glúteo Sentado</strong>
                    <span>3 series x 45 seg por lado // Cruza un tobillo sobre la rodilla contraria.</span>
                </div>
            </div>`,
        3: `
            <div class="split-card">
                <span class="split-title">DÍA 01: POSTURA & PECHO</span>
                <div class="exercise-item"><strong>Aperturas en T (Contra Pared)</strong><span>3x12 reps // Abre el pecho colapsado por el teclado.</span></div>
                <div class="exercise-item"><strong>Chin Tucks</strong><span>3x15 reps // Empuja la barbilla hacia atrás para corregir postura.</span></div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 02: CADERA BÁSICA</span>
                <div class="exercise-item"><strong>Estiramiento de Flexores (Zancada)</strong><span>3x30 seg por pierna // Estira el psoas acortado.</span></div>
                <div class="exercise-item"><strong>Círculos de Cadera de Pie</strong><span>3x15 círculos amplios</span></div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 03: MUÑECAS & ANTEBRAZOS</span>
                <div class="exercise-item"><strong>Estiramiento de Muñeca (Rezo e Invertido)</strong><span>3x30 seg // Alivia el estrés del ratón/trackpad.</span></div>
                <div class="exercise-item"><strong>Cerrar/Abrir Manos con Tensión</strong><span>3x20 reps</span></div>
            </div>`,
        4: `
            <div class="split-card">
                <span class="split-title">DÍA 01: CUELLO & TRAPECIO</span>
                <div class="exercise-item"><strong>Estiramiento de Trapecio Superior</strong><span>3x30 seg por lado</span></div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 02: MOVILIDAD ESPINAL</span>
                <div class="exercise-item"><strong>Posición del Gato (Cat-Cow)</strong><span>3x12 reps lentas</span></div>
                <div class="exercise-item"><strong>Posición del Niño (Child's Pose)</strong><span>2 min de descanso activo</span></div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 03: PIERNAS CANSADAS</span>
                <div class="exercise-item"><strong>Elevación de Talones (Calf Stretch)</strong><span>3x15 reps // Mejora el retorno venoso.</span></div>
                <div class="exercise-item"><strong>Estiramiento de Isquios en Silla</strong><span>3x30 seg por pierna</span></div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 04: RESET FULL BODY</span>
                <div class="exercise-item"><strong>Sacudidas de Extremidades</strong><span>1 min // Libera tensión nerviosa.</span></div>
                <div class="exercise-item"><strong>Respiración Diafragmática</strong><span>3 min // Oxigenación cerebral profunda.</span></div>
            </div>`
    };

    function showRoutine(days, btn) {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('routine-display').innerHTML = routines[days];
        
        window.scrollTo({
            top: document.getElementById('routine-display').offsetTop - 100,
            behavior: 'smooth'
        });
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFit | Calculadora TMB</title>
    <style>
        :root {
            --bg-color: rgb(202, 202, 202);
            --card-bg: #ffffff;
            --nav-bg: #0f172a;
            --text-main: #1e293b;
            --border-color: #000000;
            --orange: #ff9900;
            --cyan: #00d2ff; /* Color para la calculadora */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

    nav {
    display: flex;
    justify-content: space-between; /* Logo a la izquierda, links a la derecha */
    align-items: center;
    padding: 0.8rem 2rem; /* Reducimos el padding vertical */
    background: var(--nav-bg);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
}

/* Contenedor de enlaces */
.nav-links {
    display: flex;
    gap: 25px;
}

nav a {
    color: #ff9900;
    text-decoration: none;
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.85rem; /* Un poco más pequeño para legibilidad */
    letter-spacing: 1px;
}

/* --- LOGO COMPACTO E INTERACTIVO --- */
.devfit-logo-wrapper {
    display: flex;
    align-items: center;
    gap: 8px; /* Menos espacio entre icono y texto */
    text-decoration: none !important; /* Quita subrayados de enlace */
    padding: 0;
}

.devfit-symbol {
    width: 32px; /* Reducido de 45px */
    height: 32px; /* Reducido de 45px */
    border: 2px solid #000000;
    background-color: #ffffff;
    border-radius: 40% 10% 40% 40%; 
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 2px 2px 0px #ff7a00; /* Sombra más pequeña */
    transition: all 0.2s ease;
}

.code-icon {
    color: #00d2ff;
    font-family: 'Courier New', monospace;
    font-weight: 900;
    font-size: 0.75rem; /* Icono más pequeño */
}

.devfit-brand {
    font-size: 1.3rem; /* Reducido de 1.8rem */
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.5px;
    display: flex;
    align-items: baseline;
    text-transform: none; /* Evita que el logo se ponga en mayúsculas por el estilo general de nav a */
}

.text-dev { color: #ff7a00; }
.text-sh {
    color: #00d2ff;
    font-size: 0.7rem;
    font-family: 'Courier New', monospace;
    margin-left: 1px;
}

/* Hover interactivo para todo el logo */
.devfit-logo-wrapper:hover .devfit-symbol {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0px #ff7a00;
}
        .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; }
        
        header { text-align: center; margin-bottom: 50px; }
        header h1 {
    font-size: 3.5rem;
    margin: 0;
    font-weight: 900;
    /* 1. Definimos el degradado */
    background: linear-gradient(135deg, #000 0%, #444 100%);
    
    /* 2. Aplicamos el recorte al texto (Estándar) */
    background-clip: text;
    
    /* 3. Aplicamos el recorte para navegadores basados en Webkit (Chrome, Safari, Edge) */
    -webkit-background-clip: text;
    
    /* 4. Hacemos que el color original del texto sea transparente para que se vea el fondo */
    color: transparent; 
    -webkit-text-fill-color: transparent; /* Refuerzo para algunos navegadores antiguos */
    
    letter-spacing: -2px;
}

        .calc-card {
            background: var(--card-bg);
            border: 3px solid var(--border-color);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 12px 12px 0px var(--border-color);
        }

        .form-group { margin-bottom: 20px; }
        
        label { display: block; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; font-size: 0.9rem; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            box-sizing: border-box;
        }

        .btn-calc {
            width: 100%;
            background: var(--cyan);
            color: var(--nav-bg);
            border: 2px solid var(--border-color);
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 4px 4px 0px var(--border-color);
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-calc:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--border-color); }

        #result-display {
            margin-top: 30px;
            padding: 25px;
            border: 2px dashed var(--border-color);
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.5s ease;
            background: #f8fafc;
        }

        .result-value { font-size: 2.5rem; font-weight: 900; color: var(--cyan); display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        footer { text-align: center; padding: 60px; background: var(--nav-bg); color: orange; margin-top: 60px; }
    </style>
</head>
<body>

     <nav>
    <a href="index.html" class="devfit-logo-wrapper">
        <div class="devfit-symbol">
            <span class="code-icon">&lt;/&gt;</span>
        </div>
        <div class="devfit-brand">
            <span class="text-dev">dev</span>Fit<span class="text-sh">.sh</span>
        </div>
    </a>

    <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="rutinasVarias.html">Rutinas</a>
        <a href="problemasVarios.html">Problemas</a>
        <a href="ergonomia.html">Ergonomía</a>
    </div>
</nav>

    <div class="container">
        <header>
            <h1>Energy_Consumption.exe</h1>
            <p>// Calcula el combustible que necesita tu unidad central</p>
        </header>

        <div class="calc-card">
            <div class="form-group">
                <label>Género</label>
                <select id="gender">
                    <option value="male">Male (Hombre)</option>
                    <option value="female">Female (Mujer)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Peso (kg)</label>
                <input type="number" id="weight" placeholder="Ej: 75">
            </div>
            <div class="form-group">
                <label>Altura (cm)</label>
                <input type="number" id="height" placeholder="Ej: 180">
            </div>
            <div class="form-group">
                <label>Edad</label>
                <input type="number" id="age" placeholder="Ej: 28">
            </div>
            <button class="btn-calc" onclick="calculateTMB()">Ejecutar Diagnóstico</button>

            <div id="result-display">
                <h3>[RESULTADO DEL SISTEMA]</h3>
                <p>Tu Tasa Metabólica Basal es de:</p>
                <span class="result-value" id="tmb-value">0</span>
                <p style="font-size: 0.8rem; color: #64748b;">*Estas son las calorías que quemas en reposo total (estado 'idle').</p>
            </div>
        </div>
    </div>

    <footer>
        <span style="color:white; font-weight:900;">DevFit.sh</span><br>
        Energy Optimization Systems
    </footer>

    <script>
        function calculateTMB() {
            const gender = document.getElementById('gender').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const age = parseInt(document.getElementById('age').value);

            if (isNaN(weight) || isNaN(height) || isNaN(age)) {
                alert("Por favor, completa todos los campos con valores válidos.");
                return;
            }

            let tmb = 0;

            // Ecuación de Harris-Benedict revisada
            if (gender === 'male') {
                tmb = (10 * weight) + (6.25 * height) - (5 * age) + 5;
            } else {
                tmb = (10 * weight) + (6.25 * height) - (5 * age) - 161;
            }

            document.getElementById('tmb-value').innerText = Math.round(tmb) + " kcal";
            document.getElementById('result-display').style.display = 'block';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFit | Movilidad Nivel Alto (Advanced Kinematics)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff4757; /* Carmesí para Movilidad Alto */
            --bg-dark: #0f172a;
            --bg-light: #f8fafc;
            --orange: #ff7a00;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: #1e293b;
            line-height: 1.6;
        }

        /* --- NAVEGACIÓN --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 70px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .devfit-logo-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none !important;
        }

        .devfit-symbol {
            width: 32px;
            height: 32px;
            border: 2px solid #000000;
            background-color: #ffffff;
            border-radius: 40% 10% 40% 40%; 
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 2px 2px 0px var(--orange);
        }

        .code-icon {
            color: #00d2ff;
            font-family: 'Courier New', monospace;
            font-weight: 900;
            font-size: 0.75rem;
        }

        .devfit-brand {
            font-size: 1.3rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* --- ADSENSE --- */
        .ads-box {
            background: #ebf2f7;
            border: 1px dashed #cbd5e1;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #94a3b8;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .ads-top { width: 100%; max-width: 728px; height: 90px; }

        /* --- HEADER --- */
        header {
            background: var(--bg-dark);
            padding: 80px 20px 120px;
            text-align: center;
            color: white;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
        }

        header h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 900;
            margin: 0;
        }

        header span { color: var(--primary); }

        /* --- CONTAINER & SELECTOR --- */
        .container {
            max-width: 900px;
            margin: -60px auto 0;
            padding: 0 20px 100px;
        }

        .selector-card {
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: var(--card-shadow);
            text-align: center;
            margin-bottom: 40px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .day-btn {
            background: var(--bg-light);
            border: 2px solid #e2e8f0;
            padding: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'JetBrains Mono', monospace;
            border-radius: 4px;
        }

        .day-btn:hover { border-color: var(--primary); color: var(--primary); }
        .day-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- ROUTINE --- */
        .split-card {
            background: white;
            border-radius: 4px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border-left: 6px solid var(--primary);
            animation: fadeIn 0.5s ease;
        }

        .split-title {
            display: inline-block;
            background: var(--bg-dark);
            color: var(--primary);
            padding: 5px 15px;
            font-weight: 900;
            margin-bottom: 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-family: 'JetBrains Mono', monospace;
        }

        .exercise-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .exercise-item:last-child { border: none; }
        .exercise-item strong { display: block; font-size: 1.1rem; color: var(--bg-dark); }
        .exercise-item span {
            color: #64748b;
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            display: block;
            margin-top: 4px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { background: #000; color: white; padding: 60px; text-align: center; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="devfit-logo-wrapper">
        <div class="devfit-symbol"><span class="code-icon">&lt;/&gt;</span></div>
        <div class="devfit-brand"><span style="color:#cbd5e1">dev</span>Fit<span style="color:#cbd5e1; font-size: 0.7rem; font-family: monospace;">.sh</span></div>
    </a>
    <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="rutinasVarias.html">Volver</a>
    </div>
</nav>

<header>
    <h1>MOVILIDAD_<span>ALTO</span>.EXE</h1>
    <p>// ADVANCED_KINEMATICS: FULL RANGE CONTROL & FLOW</p>
</header>

<div class="container">
    <div class="ads-box ads-top">Publicidad AdSense</div>

    <div class="selector-card">
        <h3 style="font-weight: 900; margin-top: 0;">KINEMATIC_SELECTOR</h3>
        <p style="color: #64748b; font-size: 0.9rem;">Protocolos de alta intensidad articular para optimizar rangos finales:</p>
        <div class="days-grid">
            <button class="day-btn" onclick="showRoutine(2, this)">2_DAYS</button>
            <button class="day-btn" onclick="showRoutine(3, this)">3_DAYS</button>
            <button class="day-btn" onclick="showRoutine(4, this)">4_DAYS</button>
        </div>
    </div>

    <div id="routine-display"></div>

    <div class="ads-box ads-top">Publicidad AdSense</div>
</div>

<footer>
    <div style="font-weight: 900; font-size: 1.5rem;">DEV<span style="color:var(--primary)">FIT</span>.SH</div>
    <p>&copy; 2026 - LEVEL: ELITE_RANGE_CONTROL</p>
</footer>

<script>
    const routines = {
        2: `
            <div class="split-card">
                <span class="split-title">DÍA 01: CADERA & TREN INFERIOR (FRC)</span>
                <div class="exercise-item">
                    <strong>CARs de Cadera (Controlled Articular Rotations)</strong>
                    <span>4 series x 5 círculos lentos // Control total en el borde del rango.</span>
                </div>
                <div class="exercise-item">
                    <strong>Pigeon Stretch Activo (Isométrico)</strong>
                    <span>3 series x 1 min // Irradia tensión contra el suelo (PAILS/RAILS).</span>
                </div>
                <div class="exercise-item">
                    <strong>Sentadilla Profunda + Rotación Torácica</strong>
                    <span>3 series x 12 reps // Disociación de cadera y columna.</span>
                </div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 02: COLUMNA & HOMBROS ELITE</span>
                <div class="exercise-item">
                    <strong>Puente Completo (Wheel Pose)</strong>
                    <span>3 series x 8 reps // Apertura máxima de la cadena anterior.</span>
                </div>
                <div class="exercise-item">
                    <strong>Swimmer Hovers</strong>
                    <span>3 series x 10 reps // Control escapular sin contacto con suelo.</span>
                </div>
            </div>`,
        3: `
            <div class="split-card">
                <span class="split-title">DÍA 01: LOWER BODY FLOW</span>
                <div class="exercise-item"><strong>Transiciones 90/90 (Sin Manos)</strong><span>4x10 cambios lentos</span></div>
                <div class="exercise-item"><strong>Cossack Squat Profunda</strong><span>4x12 reps</span></div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 02: UPPER BODY POWER</span>
                <div class="exercise-item"><strong>Skin the Cat (Barra o Banda)</strong><span>3x8 reps // Rango extremo de hombro.</span></div>
                <div class="exercise-item"><strong>Cobra a Perro Boca Abajo Dinámico</strong><span>4x1 min</span></div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 03: END-RANGE ISOMETRICS</span>
                <div class="exercise-item"><strong>Split Lateral (Progresivo)</strong><span>3x45 seg // Control isométrico en apertura.</span></div>
                <div class="exercise-item"><strong>Plancha Invertida Abierta</strong><span>3x1 min</span></div>
            </div>`,
        4: `
            <div class="split-card">
                <span class="split-title">DÍA 01: ANIMAL FLOW INTEGRATION</span>
                <div class="exercise-item"><strong>Beast Reach & Crab Reach</strong><span>4x1 min // Fluidez multiplanar.</span></div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 02: CONTROL SEGMENTADO</span>
                <div class="exercise-item"><strong>Jefferson Curl con Peso</strong><span>3x10 reps // Movilidad vertebral disco a disco.</span></div>
                <div class="exercise-item"><strong>Couch Stretch Avanzado</strong><span>3x1 min por lado</span></div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 03: MUÑECAS & ANTEBRAZOS PRO</span>
                <div class="exercise-item"><strong>Flexiones de Muñeca (Rango Final)</strong><span>3x15 reps // Prevención total de túnel carpiano.</span></div>
            </div>
            <div class="split-card">
                <span class="split-title">DÍA 04: TOTAL SYSTEM FLOW</span>
                <div class="exercise-item"><strong>Vinyasa Flow Intenso</strong><span>20 minutos de flujo constante y respiración.</span></div>
            </div>`
    };

    function showRoutine(days, btn) {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('routine-display').innerHTML = routines[days];
        
        window.scrollTo({
            top: document.getElementById('routine-display').offsetTop - 100,
            behavior: 'smooth'
        });
    }
</script>

</body>
</html>
